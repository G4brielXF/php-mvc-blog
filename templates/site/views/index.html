{% extends 'base.html' %} {% block conteudo %}

<div class="container my-5">
  <div class="row">
    <div class="col-lg-9 col-md-12">
      <div class="row">
        {% for post in posts %}
        <div class="col-md-6 mb-4">
          <div class="card h-100">
            <div class="card-body">
              <a
                href="{{ url('post/'~post.id) }}"
                tooltip="tooltip"
                title="{{ post.titulo }}"
              >
                <h4 class="card-title">
                  {{ post.titulo }}
                  <a
                    href="{{url('uploads/imagens/'~post.capa)}}"
                    data-fancybox="gallery"
                    data-caption="Optional caption"
                  >
                    <img
                      src="{{url('uploads/imagens/'~post.capa)}}"
                      alt="{{post.titulo}}"
                      title="{{post.titulo}}"
                      class="capaMedi"
                      style="width: 80px; height: 50px; object-fit: cover; border-radius: 4px;"
                    />
                  </a>
                </h4>
                <div class="d-flex justify-content-between my-3 text-muted">
                  <small>{{ post.categorias.titulo | upper }}</small>
                  <small>{{ contarTempo(post.cadastrado_em) }}</small>
                </div>

                <p class="card-text">{{ resumirTexto(post.texto, 150) }}</p>
              </a>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>

    <div class="col-lg-3">{% include 'sidebar.html' %}</div>
  </div>
</div>

{% endblock %}
